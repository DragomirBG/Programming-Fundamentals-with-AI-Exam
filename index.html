<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPredictor Dashboard</title>
    <!-- Flatpickr CSS for calendar dropdown -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Column for Logo and Sidebar -->
        <div style="display: flex; flex-direction: column;">
            <div class="logo">
                <div style="background-color: #ffffff; padding: 6px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="logo-icon">
                        <path d="M4 4h16v3l-6 7v6l-4 2v-8L4 7V4z" fill="#8790a3"/>
                    </svg>
                </div>
                <h2 style="font-size: 32px; letter-spacing: -1px;"><span style="color: #8790a3; font-weight: 700;">Lead</span><span style="color: #ffffff; font-weight: 400;">Predictor</span></h2>
            </div>
            
            <aside class="sidebar">
                <div class="form-group">
                <label>Language</label>
                <div class="input-with-icon">
                    <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" alt="US Flag" class="flag-icon" style="position: absolute; left: 10px; width: 16px; border-radius: 2px; pointer-events: none;">
                    <select style="padding-left: 35px;">
                        <option>English</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Currency</label>
                <select id="currency">
                    <option value="$">$ US Dollar</option>
                    <option value="€">€ Euro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Campaign Start</label>
                <div class="input-with-icon">
                    <input type="text" id="campaign-start" value="08-May-2026" style="padding-left: 10px; padding-right: 30px;">
                    <svg class="calendar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a0a6b1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; right: 10px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
            </div>
            <div class="form-group">
                <label>Campaign End</label>
                <div class="input-with-icon">
                    <input type="text" id="campaign-end" value="04-Nov-2026" style="padding-left: 10px; padding-right: 30px;">
                    <svg class="calendar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a0a6b1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; right: 10px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
            </div>
            <div class="form-group">
                <label>Total Revenue</label>
                <div class="input-with-icon">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="total-revenue" value="10000">
                </div>
            </div>
            <div class="form-group">
                <label>Avg. Order Value</label>
                <div class="input-with-icon">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="avg-order-value" value="1000">
                </div>
            </div>
        </aside>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-section panel chart-panel">
                <div class="chart-content">
                    <div class="chart-y-label">Months</div>
                    <div class="chart-container" id="chart-container">
                        <!-- Chart rows injected by JS -->
                    </div>
                    <div class="chart-x-axis" id="chart-x-axis">
                        <!-- X-axis labels injected by JS -->
                    </div>
                    <div id="chart-tooltip" class="tooltip"></div>
                </div>

                <!-- Stats Area -->
                <div class="stats-panel">
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg> 
                                Prospects
                            </span>
                            <span class="stat-percent" id="prospects-percent">100%</span>
                        </div>
                        <div class="stat-value" id="prospects-value">125</div>
                        <div class="progress-bar"><div class="fill" id="prospects-fill" style="width: 100%;"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> 
                                Leads
                            </span>
                            <span class="stat-percent" id="leads-percent">20%</span>
                        </div>
                        <div class="stat-value" id="leads-value">25</div>
                        <div class="progress-bar"><div class="fill" id="leads-fill" style="width: 20%;"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 003.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM7 10.82C5.84 10.4 5 9.3 5 8V7h2v3.82zM19 8c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg> 
                                Customers
                            </span>
                            <span class="stat-percent" id="customers-percent">8%</span>
                        </div>
                        <div class="stat-value" id="customers-value">10</div>
                        <div class="progress-bar"><div class="fill" id="customers-fill" style="width: 8%;"></div></div>
                    </div>
                </div>
            </div>

            <div class="bottom-section">
                <div class="panel sliders-panel">
                    <div class="slider-group">
                        <div class="slider-header">
                            <label>Lead Response Rate</label>
                        </div>
                        <input type="range" id="lead-response-rate" min="1" max="100" value="40">
                        <div class="slider-value"><span id="lead-rate-display">40</span>.00%</div>
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <label>Prospect Response Rate</label>
                        </div>
                        <input type="range" id="prospect-response-rate" min="1" max="100" value="20">
                        <div class="slider-value"><span id="prospect-rate-display">20</span>.00%</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="script.js"></script>
</body>
</html>
